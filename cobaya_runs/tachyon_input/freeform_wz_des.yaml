# ══════════════════════════════════════════════════════════════════
# Reconstruction libre w(z) en bins — DESI DR2 + Planck 2018 + Pantheon+
# Amendement-01 §3 : livrable central pour sigma_phi
# Bornes figées : {0, 0.3, 0.6, 1.0, 1.5}, w=-1 au-delà
# ══════════════════════════════════════════════════════════════════

output: cobaya_runs/tachyon_output/freeform_wz_des/freeform_wz_des
packages_path: /Users/ana.feralvar/cobaya_packages

sampler:
  mcmc:
    burn_in: 0
    max_tries: 1000
    learn_proposal: True
    Rminus1_stop: 0.01
    seed: 101

theory:
  src.tachyon.cobaya_interface.FreeformWz:
    stop_at_error: False
    extra_args:
      num_massive_neutrinos: 1
      neutrino_hierarchy: degenerate

likelihood:
  bao.desi_dr2: null
  planck_2018_highl_plik.TTTEEE_lite: null
  planck_2018_lowl.TT: null
  planck_2018_lowl.EE: null
  sn.desdovekie: null

params:
  H0:
    prior: {min: 60, max: 75}
    ref: {dist: norm, loc: 67.5, scale: 0.5}
    proposal: 0.3
    latex: "H_0"
  ombh2:
    prior: {min: 0.018, max: 0.026}
    ref: {dist: norm, loc: 0.02237, scale: 0.00015}
    proposal: 0.0002
    latex: '\Omega_b h^2'
  omch2:
    prior: {min: 0.09, max: 0.15}
    ref: {dist: norm, loc: 0.1200, scale: 0.001}
    proposal: 0.001
    latex: '\Omega_c h^2'
  As:
    prior: {min: 5e-10, max: 1e-8}
    ref: {dist: norm, loc: 2.1e-9, scale: 2e-11}
    proposal: 2e-11
    latex: "A_s"
  ns:
    prior: {min: 0.88, max: 1.06}
    ref: {dist: norm, loc: 0.9649, scale: 0.005}
    proposal: 0.005
    latex: "n_s"
  tau:
    prior: {min: 0.01, max: 0.15}
    ref: {dist: norm, loc: 0.055, scale: 0.007}
    proposal: 0.007
    latex: '\tau'
  mnu: 0.06

  # ── Bins w(z) — priors plats indépendants [-3, 1] (amendement §3) ──
  w_bin1:
    prior: {min: -3.0, max: 1.0}
    ref: {dist: norm, loc: -1.0, scale: 0.1}
    proposal: 0.08
    latex: 'w_1'
  w_bin2:
    prior: {min: -3.0, max: 1.0}
    ref: {dist: norm, loc: -1.0, scale: 0.1}
    proposal: 0.08
    latex: 'w_2'
  w_bin3:
    prior: {min: -3.0, max: 1.0}
    ref: {dist: norm, loc: -1.0, scale: 0.1}
    proposal: 0.08
    latex: 'w_3'
  w_bin4:
    prior: {min: -3.0, max: 1.0}
    ref: {dist: norm, loc: -1.0, scale: 0.1}
    proposal: 0.08
    latex: 'w_4'

  Omega_m:
    derived: "lambda omch2, ombh2, H0: (omch2 + ombh2) / (H0/100)**2"
    latex: '\Omega_m'
